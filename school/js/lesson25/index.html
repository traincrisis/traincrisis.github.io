<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <div class="to-do-list">
        <h1>{{title}}</h1>
        <input v-bind:placeholder="pl"  v-on:keyup.enter="AddFunc()" v-model="note"type="text" class="note-input">
        <button v-bind:disabled=" note == '' || note == ' ' || note == '  '" class="btn-add" v-on:click="AddFunc()">Додати</button>
        <ul class="list-notes">
            <li class="list-note-item" v-for="(item, i) in  notesArr" >
                {{i+1}}. {{item}} <button class="btn-del" v-on:click="DelFunc(i)">Видалити</button>
            </li>
        </ul>
        <div class="empty" v-if="notesArr.length == 0">
            <p>Ви зробили усе заплановане!</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
